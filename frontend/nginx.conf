server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Post images are capped at 5 MB by the API; allow a little multipart overhead.
    client_max_body_size 6m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # API traffic goes to the backend service; everything else is the SPA.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite emits content-hashed filenames, so assets can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any other path is a client-side route.
    location / {
        try_files $uri /index.html;
    }
}
