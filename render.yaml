# Render Blueprint for the public portfolio deployment (ADR 0014).
#
# The database is NOT defined here: Render's free PostgreSQL is limited to one
# per account and expires after 30 days, so the demo uses a free external
# Postgres (Neon). Set DATABASE_URL on the backend service by hand
# (sync: false keeps Blueprint syncs from ever overwriting it).

services:
  - type: web
    name: nextpost-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile # last stage = production target
    dockerContext: ./backend
    # Migrations run before the app starts; Render injects $PORT.
    # NOTE: Render already executes dockerCommand via `sh -c` — do not wrap it
    # in quotes or an explicit `sh -c` (that produces "command not found: <whole string>").
    dockerCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # external (Neon) URL, set in the dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "true"
      - key: SCHEDULER_ENABLED
        value: "true" # runs the hourly demo reset…
      - key: REMINDERS_ENABLED
        value: "false" # …but not reminder emails (no SMTP in the demo)

  - type: web
    name: nextpost-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_DEMO_MODE
        value: "true"
    routes:
      # Same-origin API, exactly like nginx in the self-hosted setup.
      - type: rewrite
        source: /api/*
        destination: https://nextpost-backend.onrender.com/api/*
      # SPA fallback.
      - type: rewrite
        source: /*
        destination: /index.html
