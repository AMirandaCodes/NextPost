name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend — ruff & pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nextpost
          POSTGRES_PASSWORD: nextpost
          POSTGRES_DB: nextpost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nextpost -d nextpost_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://nextpost:nextpost@localhost:5432/nextpost_test
      DATABASE_URL: postgresql+psycopg://nextpost:nextpost@localhost:5432/nextpost_test
      SECRET_KEY: ci-only-secret-key-never-used-outside-ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install .[dev]

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest -q

  frontend:
    name: Frontend — lint, type-check, tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Tests
        run: npm test

      - name: Production build
        run: npm run build
