services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nextpost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextpost}
      POSTGRES_DB: ${POSTGRES_DB:-nextpost}
    # Host ports are offset (5433, 8001) so NextPost can run alongside other
    # local stacks that already use the defaults.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextpost -d nextpost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://nextpost:nextpost@db:5432/nextpost}
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025" # web inbox at http://localhost:8025; SMTP stays internal on 1025

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      # Linux-native node_modules live in a volume so they never clash with a
      # Windows host install of the same folder.
      - frontend_node_modules:/app/node_modules
    ports:
      - "5174:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:
