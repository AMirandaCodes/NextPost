services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nextpost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextpost}
      POSTGRES_DB: ${POSTGRES_DB:-nextpost}
    # Host ports are offset (5433, 8001) so NextPost can run alongside other
    # local stacks that already use the defaults.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextpost -d nextpost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://nextpost:nextpost@db:5432/nextpost}
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
